<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI SQL Chatbot</title>
    <!-- LangChain Agent Chat UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@langchain/agent-chat-ui/dist/index.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        .chat-header p {
            font-size: 14px;
            margin-top: 4px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div id="root">
    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>SQL Database Chatbot</h1>
            <p>Ask questions about your database in natural language</p>
        </div>
        <div id="chat-container" style="flex: 1; overflow-y: auto;"></div>
    </div>
</div>

<!-- LangChain Agent Chat UI Library -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@langchain/agent-chat-ui@latest/dist/index.umd.js"></script>

<script>
    const { AgentChat } = window.AgentChat || {};

    if (AgentChat) {
        const root = ReactDOM.createRoot(document.getElementById('chat-container'));
        root.render(
            React.createElement(AgentChat, {
                apiEndpoint: '/api/chat',
                title: 'SQL Chatbot',
                placeholder: 'Ask about your database...',
                onMessage: async (message) => {
                    try {
                        const response = await fetch('/api/chat', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'text/plain;charset=UTF-8',
                            },
                            body: message,
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const text = await response.text();
                        return text;
                    } catch (error) {
                        return `Error: ${error.message}`;
                    }
                }
            })
        );
    } else {
        // Fallback if library fails to load
        console.warn('AgentChat UI library failed to load, using fallback chat interface');
        document.body.innerHTML = `
            <div style="display: flex; flex-direction: column; height: 100vh; background: #f5f5f5;">
                <div style="padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h1 style="margin: 0;">SQL Database Chatbot</h1>
                    <p style="margin: 8px 0 0 0; opacity: 0.9;">Ask questions about your database in natural language</p>
                </div>
                <div id="chatContainer" style="flex: 1; overflow-y: auto; padding: 20px; background: white;"></div>
                <form id="chatForm" style="display: flex; padding: 15px; background: white; border-top: 1px solid #ddd; gap: 10px;">
                    <input id="messageInput" placeholder="Ask about your database..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px;" required />
                    <button id="sendBtn" type="submit" style="background-color: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500;">Send</button>
                </form>
            </div>
        `;

        // Fallback chat implementation
        const chatContainer = document.getElementById("chatContainer");
        const chatForm = document.getElementById("chatForm");
        const messageInput = document.getElementById("messageInput");

        function addMessage(text, sender) {
            const bubble = document.createElement("div");
            bubble.style.cssText = sender === 'user'
                ? 'max-width: 80%; padding: 12px 16px; margin: 8px 0; border-radius: 12px; white-space: pre-wrap; line-height: 1.5; align-self: flex-end; background-color: #667eea; color: white; border-bottom-right-radius: 4px; margin-left: auto;'
                : 'max-width: 80%; padding: 12px 16px; margin: 8px 0; border-radius: 12px; white-space: pre-wrap; line-height: 1.5; align-self: flex-start; background-color: #f0f0f0; border: 1px solid #ddd; border-bottom-left-radius: 4px;';
            bubble.textContent = text;
            chatContainer.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;
            addMessage(message, "user");
            messageInput.value = "";

            addMessage("⏳ Thinking...", "bot");

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=UTF-8',
                    },
                    body: message,
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const text = await response.text();
                chatContainer.lastChild.remove();
                addMessage(text, "bot");
            } catch (error) {
                chatContainer.lastChild.remove();
                addMessage(`Error: ${error.message}`, "bot");
            }
        });
    }
</script>
</body>
</html>
